<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>yt-downloader</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        width: 300px;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 13px;
        color: #1a1a1a;
      }
      h1 {
        font-size: 15px;
        margin-bottom: 12px;
      }
      label {
        display: block;
        margin-bottom: 4px;
        font-weight: 500;
        color: #555;
      }
      select,
      input[type='text'] {
        width: 100%;
        padding: 6px 8px;
        border: 1px solid #ccc;
        border-radius: 6px;
        margin-bottom: 12px;
        font-size: 13px;
      }
      .checkbox-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
      }
      .checkbox-row input {
        width: auto;
        margin: 0;
      }
      .checkbox-row label {
        margin: 0;
        font-weight: normal;
      }
      #status {
        padding: 8px 10px;
        border-radius: 6px;
        font-size: 12px;
        margin-bottom: 12px;
      }
      #status.ok {
        background: #e8f5e9;
        color: #2e7d32;
      }
      #status.error {
        background: #ffebee;
        color: #c62828;
      }
      #status.loading {
        background: #e3f2fd;
        color: #1565c0;
      }
      button {
        width: 100%;
        padding: 8px;
        background: #ff0000;
        color: #fff;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
      }
      button:hover {
        background: #cc0000;
      }
      .hint {
        margin-top: 12px;
        font-size: 11px;
        color: #888;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <h1>yt-downloader</h1>
    <div id="status" class="loading">サーバー確認中...</div>

    <label for="serverUrl">ローカルサーバー URL</label>
    <input type="text" id="serverUrl" value="http://127.0.0.1:8765" />

    <label for="quality">画質</label>
    <select id="quality">
      <option value="best">最高画質</option>
      <option value="1080">1080p</option>
      <option value="720">720p</option>
      <option value="480">480p</option>
      <option value="360">360p</option>
    </select>

    <div class="checkbox-row">
      <input type="checkbox" id="audioOnly" />
      <label for="audioOnly">音声のみ (MP3)</label>
    </div>

    <div class="checkbox-row">
      <input type="checkbox" id="saveDescription" />
      <label for="saveDescription">概要欄も保存</label>
    </div>

    <div class="checkbox-row">
      <input type="checkbox" id="saveComments" />
      <label for="saveComments">コメントも保存</label>
    </div>

    <button id="save">設定を保存</button>

    <p class="hint">
      使い方: ターミナルで <code>npm run server</code> を実行し、YouTube
      フィードのサムネイルにマウスを乗せるとダウンロードボタンが表示されます。
    </p>

    <script src="popup.js"></script>
  </body>
</html>
